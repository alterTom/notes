<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --sidebar-w: 280px;
    --bg: #1a73e8;
    --surface: #f6fafd;
    --border: #d4e2f0;
    --text: #1a1c1e;
    --text-secondary: #556677;
    --text-muted: #8899aa;
    --accent: #2b7bd6;
    --accent-hover: #2368b8;
    --accent-bg: #dce8f4;
    --danger: #d93025;
    --danger-hover: #b3261e;
    --danger-bg: #fce8e6;
    --hover-bg: #e2ecf6;
}

html, body { height: 100%; overflow: hidden; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    color: var(--text);
    background: var(--bg);
    font-size: 14px;
}

#app {
    display: flex;
    height: 100%;
}

/* ===== Sidebar ===== */
#sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100%;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
}

.sidebar-header h1 {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 0;
}

.header-actions { display: flex; gap: 6px; align-items: center; }

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
    font-size: 13px;
    border-radius: 6px;
    font-weight: 500;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    font-family: inherit;
    line-height: 1;
}

.btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 7px 14px;
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-icon {
    padding: 0;
    background: transparent;
    color: var(--text-secondary);
    width: 32px;
    height: 32px;
    font-size: 15px;
    border-radius: 6px;
}
.btn-icon:hover { background: var(--hover-bg); color: var(--text); }

.btn-sm {
    padding: 5px 10px;
    font-size: 12px;
    background: transparent;
    color: var(--danger);
    border-radius: 6px;
}
.btn-sm:hover { background: var(--danger-bg); }

.search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.search-input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
}
.search-input:focus { border-color: var(--accent); background: var(--surface); }
.search-input::placeholder { color: var(--text-muted); }

#note-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 8px;
}

.note-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2px;
    transition: background 0.1s;
    user-select: none;
}
.note-item:hover { background: var(--hover-bg); }
.note-item.active { background: var(--accent-bg); }
.note-item.active .note-item-title { color: var(--accent); }

.note-item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
}

.note-item-title {
    font-size: 14px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
}

.note-item-del {
    opacity: 0;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.1s, background 0.1s, color 0.1s;
}
.note-item:hover .note-item-del { opacity: 1; }
.note-item-del:hover { background: var(--danger-bg); color: var(--danger); }

.note-item-preview {
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 3px;
}

.note-item-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
}

.empty-list {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
}

/* ===== Main ===== */
#main {
    flex: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
}

#editor-container {
    flex: 1;
    flex-direction: column;
    display: none;
}
#editor-container.visible { display: flex; }

.editor-header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.title-input {
    width: 100%;
    font-size: 22px;
    font-weight: 600;
    border: none;
    outline: none;
    color: var(--text);
    background: transparent;
    padding: 0;
    font-family: inherit;
}
.title-input::placeholder { color: var(--text-muted); }

.editor-body {
    flex: 1;
    padding: 20px 28px;
    overflow-y: auto;
}

.content-textarea {
    width: 100%;
    height: 100%;
    min-height: 200px;
    border: none;
    outline: none;
    resize: none;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    background: transparent;
    font-family: inherit;
}
.content-textarea::placeholder { color: var(--text-muted); }

.status-bar {
    padding: 10px 28px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}

.empty-editor {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
}

/* ===== Test Overlay ===== */
#test-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
}
#test-overlay.visible { display: flex; }

.test-panel {
    background: var(--surface);
    border-radius: 8px;
    width: 520px;
    max-width: 90vw;
    max-height: 75vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}

.test-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.test-header h2 { font-size: 16px; font-weight: 600; }

.test-summary {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
.test-summary.all-pass { color: #188038; }
.test-summary.has-fail { color: var(--danger); }

.test-results {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 16px;
}

.test-result {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    font-size: 13px;
}
.test-result + .test-result { border-top: 1px solid var(--hover-bg); }

.test-icon {
    font-size: 16px;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
    margin-top: 1px;
}
.test-icon.pass { color: #188038; }
.test-icon.fail { color: var(--danger); }

.test-name { font-weight: 500; }
.test-error {
    font-size: 12px;
    color: var(--danger);
    margin-top: 3px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    word-break: break-all;
}

.word-count {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 16px;
}
</style>
</head>
<body>
<div id="app">
    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>笔记</h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="btn-new" title="新建笔记 (Ctrl+N)">+ 新建</button>
                <button class="btn btn-icon" id="btn-test" title="运行测试">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
                </button>
            </div>
        </div>
        <div class="search-wrap">
            <input type="text" class="search-input" id="search-input" placeholder="搜索笔记...">
        </div>
        <div id="note-list"></div>
    </div>

    <!-- Main content -->
    <div id="main">
        <div id="editor-container">
            <div class="editor-header">
                <input type="text" class="title-input" id="note-title" placeholder="无标题">
            </div>
            <div class="editor-body">
                <textarea class="content-textarea" id="note-content" placeholder="开始输入..."></textarea>
            </div>
            <div class="status-bar">
                <span id="status-time"></span>
                <span><span class="word-count" id="word-count"></span><button class="btn btn-sm" id="btn-delete">删除笔记</button></span>
            </div>
        </div>
        <div class="empty-editor" id="empty-editor">
            <span>选择左侧笔记开始编辑，或点击「+ 新建」创建笔记</span>
        </div>
    </div>
</div>

<!-- Test overlay -->
<div id="test-overlay">
    <div class="test-panel">
        <div class="test-header">
            <h2>测试结果</h2>
            <button class="btn btn-icon" id="btn-close-test">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="test-summary" id="test-summary"></div>
        <div class="test-results" id="test-results"></div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ===== Constants =====
    var STORAGE_KEY = 'notes_app_data_v1';

    // ===== State =====
    var notes = [];
    var selectedId = null;
    var searchQuery = '';
    var saveTimer = null;

    // ===== DOM =====
    var noteListEl   = document.getElementById('note-list');
    var searchInput  = document.getElementById('search-input');
    var titleInput   = document.getElementById('note-title');
    var contentArea  = document.getElementById('note-content');
    var editorCont   = document.getElementById('editor-container');
    var emptyEditor  = document.getElementById('empty-editor');
    var statusTime   = document.getElementById('status-time');
    var wordCountEl  = document.getElementById('word-count');
    var testOverlay  = document.getElementById('test-overlay');
    var testSummary  = document.getElementById('test-summary');
    var testResults  = document.getElementById('test-results');

    // ===== Data Layer =====
    function loadNotes() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            notes = raw ? JSON.parse(raw) : [];
            notes.sort(function(a, b) { return b.updatedAt - a.updatedAt; });
        } catch (e) {
            notes = [];
        }
    }

    function saveNotes() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function createNote(title, content) {
        var now = Date.now();
        var note = {
            id: 'note_' + now + '_' + Math.random().toString(36).slice(2, 8),
            title: title || '',
            content: content || '',
            createdAt: now,
            updatedAt: now
        };
        notes.unshift(note);
        saveNotes();
        return note;
    }

    function updateNote(id, updates) {
        var idx = findIndex(id);
        if (idx === -1) return null;
        updates.updatedAt = Date.now();
        Object.assign(notes[idx], updates);
        saveNotes();
        return notes[idx];
    }

    function deleteNote(id) {
        var idx = findIndex(id);
        if (idx === -1) return false;
        notes.splice(idx, 1);
        saveNotes();
        if (selectedId === id) {
            selectedId = notes.length > 0 ? notes[0].id : null;
            if (selectedId) {
                loadNoteToEditor(selectedId);
            } else {
                showEditor(false);
            }
        }
        renderNoteList();
        return true;
    }

    function findIndex(id) {
        for (var i = 0; i < notes.length; i++) {
            if (notes[i].id === id) return i;
        }
        return -1;
    }

    function getFilteredNotes() {
        var q = searchQuery.toLowerCase().trim();
        if (!q) return notes;
        return notes.filter(function(n) {
            return n.title.toLowerCase().indexOf(q) !== -1 ||
                   n.content.toLowerCase().indexOf(q) !== -1;
        });
    }

    // ===== UI Layer =====
    function renderNoteList() {
        var filtered = getFilteredNotes();
        if (filtered.length === 0) {
            noteListEl.innerHTML = '<div class="empty-list">' +
                (searchQuery ? '无匹配结果' : '暂无笔记<br>点击「+ 新建」开始') +
                '</div>';
            return;
        }
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var n = filtered[i];
            var active = n.id === selectedId ? ' active' : '';
            html +=
                '<div class="note-item' + active + '" data-id="' + n.id + '">' +
                    '<div class="note-item-row">' +
                        '<span class="note-item-title">' + esc(n.title || '无标题') + '</span>' +
                        '<button class="note-item-del" data-action="del" data-id="' + n.id + '" title="删除">×</button>' +
                    '</div>' +
                    '<div class="note-item-preview">' + esc(trimTo(n.content, 60) || '空白笔记') + '</div>' +
                    '<div class="note-item-time">' + formatRelativeTime(n.updatedAt) + '</div>' +
                '</div>';
        }
        noteListEl.innerHTML = html;
    }

    function showEditor(show) {
        if (show) {
            editorCont.classList.add('visible');
            emptyEditor.style.display = 'none';
        } else {
            editorCont.classList.remove('visible');
            emptyEditor.style.display = '';
        }
    }

    function selectNote(id) {
        flushSave();
        loadNoteToEditor(id);
        renderNoteList();
    }

    function loadNoteToEditor(id) {
        selectedId = id;
        var note = findNote(id);
        if (note) {
            titleInput.value = note.title;
            contentArea.value = note.content;
            statusTime.textContent = '最后修改：' + formatRelativeTime(note.updatedAt);
            updateWordCount();
            showEditor(true);
        }
    }

    function findNote(id) {
        for (var i = 0; i < notes.length; i++) {
            if (notes[i].id === id) return notes[i];
        }
        return null;
    }

    function updateWordCount() {
        var text = contentArea.value.trim();
        var chars = text.length;
        wordCountEl.textContent = chars + ' 字';
    }

    // ===== Helpers =====
    function esc(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function trimTo(str, max) {
        str = (str || '').replace(/\s+/g, ' ').trim();
        return str.length > max ? str.slice(0, max) + '...' : str;
    }

    function formatRelativeTime(ts) {
        var diff = Date.now() - ts;
        var minutes = Math.floor(diff / 60000);
        var hours = Math.floor(diff / 3600000);
        var days = Math.floor(diff / 86400000);

        if (minutes < 1) return '刚刚';
        if (minutes < 60) return minutes + ' 分钟前';
        if (hours < 24) return hours + ' 小时前';
        if (days < 7) return days + ' 天前';
        return new Date(ts).toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // ===== Auto-save =====
    function scheduleSave() {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(flushSave, 500);
    }

    function flushSave() {
        if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
        if (!selectedId) return;
        var note = findNote(selectedId);
        if (!note) return;
        var newTitle = titleInput.value;
        var newContent = contentArea.value;
        if (note.title !== newTitle || note.content !== newContent) {
            updateNote(selectedId, { title: newTitle, content: newContent });
            note = findNote(selectedId);
            if (note) {
                statusTime.textContent = '最后修改：' + formatRelativeTime(note.updatedAt);
            }
            renderNoteList();
        }
    }

    // ===== Event Handlers =====
    document.getElementById('btn-new').addEventListener('click', function() {
        flushSave();
        var note = createNote();
        selectNote(note.id);
        titleInput.focus();
    });

    document.getElementById('btn-delete').addEventListener('click', function() {
        if (!selectedId) return;
        var note = findNote(selectedId);
        var label = note && note.title ? '「' + note.title + '」' : '这条笔记';
        if (confirm('确定要删除' + label + '吗？此操作不可撤销。')) {
            deleteNote(selectedId);
        }
    });

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
            e.preventDefault();
            flushSave();
            var note = createNote();
            selectNote(note.id);
            titleInput.focus();
        }
    });

    searchInput.addEventListener('input', function() {
        searchQuery = searchInput.value;
        renderNoteList();
    });

    noteListEl.addEventListener('click', function(e) {
        var delBtn = e.target.closest('[data-action="del"]');
        if (delBtn) {
            e.stopPropagation();
            var id = delBtn.getAttribute('data-id');
            var note = findNote(id);
            var label = note && note.title ? '「' + note.title + '」' : '这条笔记';
            if (confirm('确定要删除' + label + '吗？')) {
                deleteNote(id);
            }
            return;
        }
        var item = e.target.closest('.note-item');
        if (item && item.dataset.id) {
            selectNote(item.dataset.id);
        }
    });

    titleInput.addEventListener('input', scheduleSave);
    contentArea.addEventListener('input', function() {
        updateWordCount();
        scheduleSave();
    });

    window.addEventListener('beforeunload', flushSave);

    // ===== Test Framework =====
    var testCases = [];

    function test(name, fn) {
        testCases.push({ name: name, fn: fn });
    }

    function assert(condition, msg) {
        if (!condition) throw new Error(msg || '断言失败');
    }

    // --- Define tests ---
    test('创建笔记：返回正确的笔记对象结构', function() {
        notes = [];
        var note = createNote();
        assert(!!note.id, '笔记应有 id');
        assert(typeof note.title === 'string', 'title 应为字符串');
        assert(typeof note.content === 'string', 'content 应为字符串');
        assert(typeof note.createdAt === 'number' && note.createdAt > 0, 'createdAt 应为时间戳');
        assert(note.updatedAt === note.createdAt, '新建时 updatedAt 应等于 createdAt');
    });

    test('创建笔记：笔记保存到 notes 数组', function() {
        notes = [];
        var note = createNote('测试标题', '测试内容');
        assert(notes.length === 1, 'notes 数组应有 1 条笔记');
        assert(notes[0].title === '测试标题', '标题应匹配');
        assert(notes[0].content === '测试内容', '内容应匹配');
    });

    test('持久化：笔记写入 localStorage', function() {
        notes = [];
        var note = createNote('持久化测试');
        saveNotes();
        var raw = localStorage.getItem(STORAGE_KEY);
        assert(raw !== null, 'localStorage 中应有数据');
        var parsed = JSON.parse(raw);
        assert(parsed.length === 1, '应有一条笔记');
        assert(parsed[0].title === '持久化测试', '标题应匹配');
    });

    test('加载：从 localStorage 正确加载笔记', function() {
        var testNote = [{ id: 'load_test_1', title: '加载测试', content: '内容体', createdAt: 1000, updatedAt: 2000 }];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(testNote));
        loadNotes();
        assert(notes.length === 1, '应加载 1 条笔记');
        assert(notes[0].id === 'load_test_1', 'ID 应匹配');
        assert(notes[0].title === '加载测试', '标题应匹配');
    });

    test('更新笔记：修改标题和内容', function() {
        notes = [];
        var note = createNote('旧标题', '旧内容');
        var result = updateNote(note.id, { title: '新标题', content: '新内容' });
        assert(result !== null, 'updateNote 应返回笔记对象');
        var updated = findNote(note.id);
        assert(updated.title === '新标题', '标题应更新为新标题');
        assert(updated.content === '新内容', '内容应更新为新内容');
    });

    test('更新笔记：updatedAt 时间戳应更新', function() {
        notes = [];
        var note = createNote('时间测试');
        var oldTs = note.updatedAt;
        var start = Date.now();
        while (Date.now() === start) { /* busy-wait for 1ms */ }
        var updated = updateNote(note.id, { title: '改' });
        assert(updated.updatedAt > oldTs, 'updatedAt 应大于旧值');
    });

    test('更新不存在的笔记：应返回 null', function() {
        notes = [];
        var result = updateNote('non_existent_id', { title: 'x' });
        assert(result === null, '不存在的笔记更新应返回 null');
    });

    test('删除笔记：从 notes 数组移除', function() {
        notes = [];
        var note = createNote();
        assert(notes.length === 1, '删除前应有 1 条');
        var result = deleteNote(note.id);
        assert(result === true, 'deleteNote 应返回 true');
        assert(notes.length === 0, '删除后应为 0 条');
    });

    test('删除笔记：从 localStorage 移除', function() {
        notes = [];
        var note = createNote('删我');
        saveNotes();
        deleteNote(note.id);
        var raw = localStorage.getItem(STORAGE_KEY);
        var parsed = JSON.parse(raw);
        assert(parsed.length === 0, 'localStorage 中应无笔记');
    });

    test('删除不存在的笔记：应返回 false', function() {
        notes = [];
        createNote();
        var result = deleteNote('non_existent_id');
        assert(result === false, '删除不存在的笔记应返回 false');
        assert(notes.length === 1, '笔记数量不应变化');
    });

    test('排序：笔记按 updatedAt 降序排列', function() {
        notes = [];
        var n1 = createNote('第一');
        var n2 = createNote('第二');
        updateNote(n1.id, { title: '更新后的第一' });
        loadNotes();
        assert(notes[0].id === n1.id, '最近更新的笔记应在最前');
    });

    test('搜索：按标题匹配', function() {
        notes = [];
        createNote('项目计划', '');
        createNote('会议纪要', '');
        searchQuery = '项目';
        var filtered = getFilteredNotes();
        assert(filtered.length === 1, '应匹配到 1 条');
        assert(filtered[0].title === '项目计划', '应为项目计划');
        searchQuery = '';
    });

    test('搜索：按内容匹配', function() {
        notes = [];
        createNote('笔记A', '这是一个关于预算的内容');
        createNote('笔记B', '这是另一个话题');
        searchQuery = '预算';
        var filtered = getFilteredNotes();
        assert(filtered.length === 1, '应匹配到 1 条');
        searchQuery = '';
    });

    test('搜索：空查询返回所有笔记', function() {
        notes = [];
        createNote();
        createNote();
        createNote();
        searchQuery = '';
        var filtered = getFilteredNotes();
        assert(filtered.length === 3, '应返回全部 3 条');
    });

    test('搜索：无匹配时返回空数组', function() {
        notes = [];
        createNote('测试');
        searchQuery = 'zzzzNoMatchString999';
        var filtered = getFilteredNotes();
        assert(filtered.length === 0, '应返回空数组');
        searchQuery = '';
    });

    test('搜索：不区分大小写', function() {
        notes = [];
        createNote('Hello World');
        searchQuery = 'hello';
        var filtered = getFilteredNotes();
        assert(filtered.length === 1, '小写搜索应匹配');
        searchQuery = '';
    });

    test('笔记 ID 唯一性：批量创建不重复', function() {
        notes = [];
        var ids = {};
        for (var i = 0; i < 30; i++) {
            var note = createNote();
            assert(!ids[note.id], 'ID 不应重复: ' + note.id);
            ids[note.id] = true;
        }
    });

    // --- Run tests ---
    function runAllTests() {
        var savedNotes = JSON.parse(JSON.stringify(notes));
        var savedSelectedId = selectedId;
        var savedSearch = searchQuery;

        notes = [];
        selectedId = null;
        searchQuery = '';
        localStorage.removeItem(STORAGE_KEY);

        var results = [];
        var passed = 0;
        var failed = 0;

        for (var i = 0; i < testCases.length; i++) {
            var tc = testCases[i];
            try {
                tc.fn();
                results.push({ name: tc.name, pass: true });
                passed++;
            } catch (e) {
                results.push({ name: tc.name, pass: false, error: e.message || String(e) });
                failed++;
            }
            notes = [];
            searchQuery = '';
        }

        notes = savedNotes;
        selectedId = savedSelectedId;
        searchQuery = savedSearch;
        saveNotes();
        renderNoteList();
        if (selectedId && findNote(selectedId)) {
            loadNoteToEditor(selectedId);
        } else if (notes.length > 0) {
            loadNoteToEditor(notes[0].id);
        } else {
            showEditor(false);
        }

        var allPass = failed === 0;
        testSummary.textContent = (allPass ? '全部通过 ' : '') +
            passed + '/' + testCases.length + ' 通过' +
            (failed > 0 ? '，' + failed + ' 失败' : '');
        testSummary.className = 'test-summary ' + (allPass ? 'all-pass' : 'has-fail');

        var html = '';
        for (var r = 0; r < results.length; r++) {
            var res = results[r];
            var icon = res.pass ? '<span class="test-icon pass">✓</span>' : '<span class="test-icon fail">✗</span>';
            html += '<div class="test-result">' + icon +
                '<div><span class="test-name">' + (r + 1) + '. ' + esc(res.name) + '</span>' +
                (res.error ? '<div class="test-error">' + esc(res.error) + '</div>' : '') +
                '</div></div>';
        }
        testResults.innerHTML = html;
        testOverlay.classList.add('visible');
    }

    document.getElementById('btn-test').addEventListener('click', runAllTests);

    document.getElementById('btn-close-test').addEventListener('click', function() {
        testOverlay.classList.remove('visible');
    });

    testOverlay.addEventListener('click', function(e) {
        if (e.target === testOverlay) testOverlay.classList.remove('visible');
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && testOverlay.classList.contains('visible')) {
            testOverlay.classList.remove('visible');
        }
    });

    // ===== Init =====
    loadNotes();
    renderNoteList();
    if (notes.length > 0) {
        loadNoteToEditor(notes[0].id);
    }
})();
</script>
