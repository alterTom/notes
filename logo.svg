<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- 主背景渐变 - 保持鲜明，深浅背景均可见 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- 折角渐变 -->
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <!-- 高光环，浅色模式下给图标边缘增加呼吸感 -->
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 外发光环 - 深色模式可见 -->
  <rect x="34" y="34" width="188" height="188" rx="22" fill="none" stroke="#A78BFA" stroke-width="2.5" opacity="0.4"/>

  <!-- 主卡片 -->
  <rect x="40" y="40" width="176" height="176" rx="16" fill="url(#bg)"/>

  <!-- 顶部高光带 -->
  <rect x="40" y="40" width="176" height="80" rx="16" fill="url(#ring)"/>

  <!-- 折角 -->
  <path d="M168 40 L168 76 Q168 80 172 80 L216 80 Q216 76 216 72 L216 40 Z" fill="url(#fold)"/>
  <path d="M168 40 L216 72" stroke="#A78BFA" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- 左侧彩色书签条 -->
  <rect x="56" y="104" width="6" height="80" rx="3" fill="#FACC15"/>

  <!-- 文字行 -->
  <rect x="74" y="108" width="76" height="8" rx="4" fill="white" opacity="0.85"/>
  <rect x="74" y="128" width="104" height="8" rx="4" fill="white" opacity="0.7"/>
  <rect x="74" y="148" width="60" height="8" rx="4" fill="white" opacity="0.5"/>
  <rect x="74" y="168" width="88" height="8" rx="4" fill="white" opacity="0.35"/>

  <!-- 右下角圆点装饰 -->
  <circle cx="190" cy="190" r="6" fill="#FACC15"/>
</svg>
